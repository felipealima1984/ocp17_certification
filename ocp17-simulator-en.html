<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCP 17 — Java Certification Simulator</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e2d45;
    --accent: #f59e0b;
    --accent2: #3b82f6;
    --green: #10b981;
    --red: #ef4444;
    --text: #e2e8f0;
    --muted: #64748b;
    --code-bg: #0d1117;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  #screen-home {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
    text-align: center;
    position: relative;
  }

  .grid-bg {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(245,158,11,0.12);
    border: 1px solid rgba(245,158,11,0.3);
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 6px 14px;
    border-radius: 100px;
    letter-spacing: 0.08em;
    margin-bottom: 2rem;
  }

  .badge::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50% { opacity:0.4; transform:scale(0.8); }
  }

  h1 {
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    font-weight: 800;
    line-height: 1;
    letter-spacing: -0.03em;
    margin-bottom: 0.5rem;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    font-family: 'JetBrains Mono', monospace;
    color: var(--muted);
    font-size: 0.85rem;
    margin-bottom: 3rem;
    letter-spacing: 0.05em;
  }

  .info-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 2.5rem;
    width: 100%;
    max-width: 480px;
  }

  .info-item {
    background: var(--surface);
    padding: 1.25rem 1rem;
    text-align: center;
  }

  .info-item .val {
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--accent);
    display: block;
  }

  .info-item .lbl {
    font-size: 0.7rem;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .btn-start {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 1rem 3rem;
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    border-radius: var(--radius);
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: all 0.2s;
  }

  .btn-start:hover {
    background: #fbbf24;
    transform: translateY(-2px);
    box-shadow: 0 12px 32px rgba(245,158,11,0.3);
  }

  .btn-start:active { transform: translateY(0); }

  #screen-exam { display: none; min-height: 100vh; }

  .exam-header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,14,26,0.9);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0.75rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }

  .exam-header .logo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    color: var(--accent);
    font-weight: 700;
    letter-spacing: 0.1em;
  }

  .progress-bar-wrap {
    flex: 1;
    max-width: 300px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .timer {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1rem;
    font-weight: 700;
    color: var(--text);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 6px 14px;
    border-radius: 6px;
    min-width: 80px;
    text-align: center;
    transition: color 0.3s, border-color 0.3s;
  }

  .timer.warning { color: var(--red); border-color: rgba(239,68,68,0.4); }

  .q-counter {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    white-space: nowrap;
  }

  .exam-body {
    max-width: 820px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem 6rem;
  }

  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 2rem;
    margin-bottom: 1.5rem;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(12px); }
    to   { opacity:1; transform:translateY(0); }
  }

  .q-topic {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--accent2);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  .q-text {
    font-size: 1.05rem;
    line-height: 1.7;
    color: var(--text);
    margin-bottom: 1.25rem;
  }

  pre {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.25rem 1.5rem;
    margin: 1rem 0 1.5rem;
    overflow-x: auto;
    position: relative;
  }

  pre::before {
    content: 'Java';
    position: absolute;
    top: 8px; right: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.06em;
  }

  code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.88rem;
    line-height: 1.7;
    color: #e2e8f0;
  }

  .kw { color: #c792ea; }
  .str { color: #c3e88d; }
  .num { color: #f78c6c; }
  .cm { color: #546e7a; font-style: italic; }
  .cls { color: #82aaff; }
  .ann { color: #ffcb6b; }

  .options-list {
    display: flex;
    flex-direction: column;
    gap: 0.65rem;
  }

  .option-btn {
    display: flex;
    align-items: flex-start;
    gap: 1rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem 1.25rem;
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
    width: 100%;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 0.95rem;
    line-height: 1.5;
  }

  .option-btn:hover:not(:disabled) {
    border-color: var(--accent2);
    background: rgba(59,130,246,0.07);
  }

  .option-btn.selected {
    border-color: var(--accent2);
    background: rgba(59,130,246,0.12);
  }

  .option-btn .letter {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--muted);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    width: 26px; height: 26px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
    transition: all 0.15s;
  }

  .option-btn.selected .letter {
    background: var(--accent2);
    border-color: var(--accent2);
    color: #fff;
  }

  .exam-footer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(10,14,26,0.95);
    backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    z-index: 100;
  }

  .nav-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 0.9rem;
    padding: 0.6rem 1.5rem;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .nav-btn:hover { border-color: var(--muted); background: var(--surface); }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .nav-btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    font-weight: 700;
  }

  .nav-btn.primary:hover { background: #fbbf24; }

  .dots-wrap {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 400px;
  }

  .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--border);
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .dot.answered { background: var(--accent2); }
  .dot.current  { background: var(--accent); transform: scale(1.4); }

  #screen-result { display: none; padding: 2rem; max-width: 860px; margin: 0 auto; }

  .result-hero {
    text-align: center;
    padding: 3rem 1rem 2rem;
  }

  .score-ring {
    width: 140px; height: 140px;
    margin: 0 auto 1.5rem;
    position: relative;
  }

  .score-ring svg { transform: rotate(-90deg); }

  .score-ring .score-text {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .score-ring .pct {
    font-size: 1.9rem;
    font-weight: 800;
    color: var(--text);
  }

  .score-ring .lbl { font-size: 0.65rem; color: var(--muted); font-family: 'JetBrains Mono', monospace; }

  .result-verdict {
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
  }

  .result-verdict.pass { color: var(--green); }
  .result-verdict.fail { color: var(--red); }

  .result-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
    margin: 2rem 0;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
    text-align: center;
  }

  .stat-card .sv { font-size: 1.8rem; font-weight: 800; }
  .stat-card .sl { font-size: 0.7rem; color: var(--muted); font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: 0.06em; margin-top: 4px; }
  .sv.green { color: var(--green); }
  .sv.red { color: var(--red); }
  .sv.blue { color: var(--accent2); }

  .section-title {
    font-size: 0.7rem;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 2rem 0 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }

  .review-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem;
    margin-bottom: 1rem;
    border-left: 3px solid var(--border);
  }

  .review-item.correct { border-left-color: var(--green); }
  .review-item.wrong   { border-left-color: var(--red); }
  .review-item.skipped { border-left-color: var(--muted); }

  .review-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.75rem;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  .review-q-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
  }

  .tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    padding: 3px 10px;
    border-radius: 100px;
    font-weight: 700;
    letter-spacing: 0.05em;
  }

  .tag.correct { background: rgba(16,185,129,0.15); color: var(--green); }
  .tag.wrong   { background: rgba(239,68,68,0.15);  color: var(--red); }
  .tag.skipped { background: rgba(100,116,139,0.15); color: var(--muted); }

  .review-q-text {
    font-size: 0.95rem;
    line-height: 1.6;
    margin-bottom: 0.75rem;
  }

  .answer-info {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    margin-bottom: 0.5rem;
  }

  .answer-info .yours { color: var(--red); }
  .answer-info .correct-ans { color: var(--green); }

  .explanation {
    background: rgba(59,130,246,0.06);
    border: 1px solid rgba(59,130,246,0.15);
    border-radius: 6px;
    padding: 0.85rem 1rem;
    font-size: 0.88rem;
    line-height: 1.6;
    color: #94a3b8;
    margin-top: 0.75rem;
  }

  .explanation::before { content: '💡 '; }

  .btn-restart {
    display: block;
    width: 100%;
    background: var(--accent);
    color: #000;
    border: none;
    padding: 1rem;
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    border-radius: var(--radius);
    cursor: pointer;
    margin: 2rem 0 4rem;
    transition: all 0.2s;
  }

  .btn-restart:hover { background: #fbbf24; transform: translateY(-1px); }

  .topic-breakdown {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
    margin-bottom: 2rem;
  }

  .topic-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.85rem 1rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.5rem;
  }

  .topic-name { font-size: 0.85rem; }

  .topic-score {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    font-weight: 700;
  }

  .topic-bar-bg {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 6px;
    flex: 1;
    min-width: 60px;
  }

  .topic-bar-fill {
    height: 100%;
    border-radius: 2px;
    background: var(--accent2);
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div class="grid-bg"></div>

<!-- HOME SCREEN -->
<div id="screen-home">
  <div class="badge">OCP — ORACLE CERTIFIED PROFESSIONAL</div>
  <h1>Java <span>17</span><br>Simulator</h1>
  <p class="subtitle">50 questions · 90 minutes · 68% to pass</p>

  <div class="info-grid">
    <div class="info-item">
      <span class="val">50</span>
      <span class="lbl">Questions</span>
    </div>
    <div class="info-item">
      <span class="val">90'</span>
      <span class="lbl">Time</span>
    </div>
    <div class="info-item">
      <span class="val">68%</span>
      <span class="lbl">To Pass</span>
    </div>
  </div>

  <button class="btn-start" onclick="startExam()">Start Exam →</button>
</div>

<!-- EXAM SCREEN -->
<div id="screen-exam">
  <div class="exam-header">
    <span class="logo">OCP 17</span>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <span class="q-counter" id="q-counter">1 / 50</span>
    <div class="timer" id="timer">90:00</div>
  </div>

  <div class="exam-body" id="exam-body"></div>

  <div class="exam-footer">
    <button class="nav-btn" id="btn-prev" onclick="navigate(-1)" disabled>← Previous</button>
    <div class="dots-wrap" id="dots-wrap"></div>
    <button class="nav-btn primary" id="btn-next" onclick="navigate(1)">Next →</button>
  </div>
</div>

<!-- RESULT SCREEN -->
<div id="screen-result">
  <div class="result-hero">
    <div class="score-ring">
      <svg width="140" height="140" viewBox="0 0 140 140">
        <circle cx="70" cy="70" r="58" fill="none" stroke="#1e2d45" stroke-width="10"/>
        <circle id="ring-fill" cx="70" cy="70" r="58" fill="none" stroke="#f59e0b"
          stroke-width="10" stroke-linecap="round"
          stroke-dasharray="364" stroke-dashoffset="364"
          style="transition: stroke-dashoffset 1.2s ease"/>
      </svg>
      <div class="score-text">
        <span class="pct" id="result-pct">0%</span>
        <span class="lbl">SCORE</span>
      </div>
    </div>
    <div class="result-verdict" id="result-verdict"></div>
    <p style="color:var(--muted);font-size:0.9rem;margin-top:0.25rem;" id="result-sub"></p>
  </div>

  <div class="result-stats">
    <div class="stat-card"><div class="sv green" id="rs-correct">0</div><div class="sl">Correct</div></div>
    <div class="stat-card"><div class="sv red"   id="rs-wrong">0</div><div class="sl">Wrong</div></div>
    <div class="stat-card"><div class="sv blue"  id="rs-skipped">0</div><div class="sl">Skipped</div></div>
  </div>

  <div class="section-title">Performance by topic</div>
  <div class="topic-breakdown" id="topic-breakdown"></div>

  <div class="section-title">Full review</div>
  <div id="review-list"></div>

  <button class="btn-restart" onclick="restart()">↺ New Exam</button>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  QUESTION BANK — OCP 17  (English / Exam Language)
//  50 initial questions (expandable to 300+)
// ═══════════════════════════════════════════════════════
const ALL_QUESTIONS = [
  // ── RECORDS ──
  {
    id: 1, topic: "Records",
    text: "Given the code below, what is the expected output?",
    code: `<span class="kw">record</span> <span class="cls">Point</span>(<span class="kw">int</span> x, <span class="kw">int</span> y) {}

<span class="kw">public class</span> <span class="cls">Main</span> {
    <span class="kw">public static void</span> main(<span class="cls">String</span>[] args) {
        <span class="cls">Point</span> p1 = <span class="kw">new</span> <span class="cls">Point</span>(<span class="num">3</span>, <span class="num">4</span>);
        <span class="cls">Point</span> p2 = <span class="kw">new</span> <span class="cls">Point</span>(<span class="num">3</span>, <span class="num">4</span>);
        <span class="cls">System</span>.out.println(p1.equals(p2) + <span class="str">" "</span> + (p1 == p2));
    }
}`,
    options: ["true false","false false","true true","Compilation error"],
    answer: 0,
    explanation: "Records automatically generate equals() based on their components. p1.equals(p2) is true because x and y are equal. p1 == p2 is false because they are distinct instances on the heap."
  },
  {
    id: 2, topic: "Records",
    text: "Which statement about records in Java 17 is INCORRECT?",
    code: null,
    options: [
      "Records are implicitly final",
      "Records can implement interfaces",
      "Records can extend other classes",
      "Records automatically generate hashCode(), equals(), and toString()"
    ],
    answer: 2,
    explanation: "Records CANNOT extend other classes (other than implicitly java.lang.Record). They are final by nature. However, they can implement interfaces normally."
  },
  {
    id: 3, topic: "Records",
    text: "What happens when you try to compile the following code?",
    code: `<span class="kw">record</span> <span class="cls">Person</span>(<span class="cls">String</span> name, <span class="kw">int</span> age) {
    <span class="kw">public</span> <span class="cls">Person</span> {
        <span class="kw">if</span> (age < <span class="num">0</span>) <span class="kw">throw new</span> <span class="cls">IllegalArgumentException</span>();
        name = name.trim();
    }
}`,
    options: [
      "Error: compact constructors cannot modify components",
      "Compiles and runs normally",
      "Error: a record cannot have an explicit constructor",
      "Error: name is final and cannot be reassigned"
    ],
    answer: 1,
    explanation: "A record's compact constructor CAN modify the parameters before they are automatically assigned to the fields. This is exactly what compact constructors are for — validation and normalization."
  },
  // ── SEALED CLASSES ──
  {
    id: 4, topic: "Sealed Classes",
    text: "Which modifier is REQUIRED for direct subclasses of a sealed class?",
    code: `<span class="kw">public sealed class</span> <span class="cls">Shape</span> <span class="kw">permits</span> <span class="cls">Circle</span>, <span class="cls">Rectangle</span> {}`,
    options: [
      "final, sealed, or non-sealed",
      "Only final",
      "abstract or final",
      "No special modifier is required"
    ],
    answer: 0,
    explanation: "Every direct subclass of a sealed class must be final (no subclasses allowed), sealed (can have its own restricted subclasses), or non-sealed (opens the hierarchy to any extension)."
  },
  {
    id: 5, topic: "Sealed Classes",

// ═══════════════════════════════════════════════════════
//  EXAM STATE
// ═══════════════════════════════════════════════════════
let questions = [];
let answers   = [];
let current   = 0;
let timerInterval = null;
let secondsLeft   = 90 * 60;
let examStartTime = null;

// ═══════════════════════════════════════════════════════
//  CORE FUNCTIONS
// ═══════════════════════════════════════════════════════
function startExam() {
  questions = [...ALL_QUESTIONS].sort(() => Math.random() - 0.5).slice(0, 50);
  answers   = new Array(questions.length).fill(null);
  current   = 0;
  secondsLeft = 90 * 60;
  examStartTime = Date.now();

  document.getElementById('screen-home').style.display = 'none';
  document.getElementById('screen-result').style.display = 'none';
  document.getElementById('screen-exam').style.display  = 'block';

  buildDots();
  renderQuestion();
  startTimer();
}

function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    secondsLeft--;
    updateTimerDisplay();
    if (secondsLeft <= 0) { clearInterval(timerInterval); finishExam(); }
  }, 1000);
}

function updateTimerDisplay() {
  const m = Math.floor(secondsLeft / 60);
  const s = secondsLeft % 60;
  const el = document.getElementById('timer');
  el.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  el.classList.toggle('warning', secondsLeft < 600);
}

function buildDots() {
  const wrap = document.getElementById('dots-wrap');
  wrap.innerHTML = '';
  questions.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' current' : '');
    d.title = `Question ${i+1}`;
    d.onclick = () => jumpTo(i);
    wrap.appendChild(d);
  });
}

function updateDots() {
  const dots = document.querySelectorAll('.dot');
  dots.forEach((d, i) => {
    d.className = 'dot';
    if (answers[i] !== null) d.classList.add('answered');
    if (i === current)       d.classList.add('current');
  });
}

function renderQuestion() {
  const q = questions[current];
  const body = document.getElementById('exam-body');

  let codeBlock = q.code ? `<pre><code>${q.code}</code></pre>` : '';

  let optionsHtml = q.options.map((opt, i) => {
    const sel = answers[current] === i ? 'selected' : '';
    const letter = String.fromCharCode(65 + i);
    return `<button class="option-btn ${sel}" onclick="selectAnswer(${i})">
      <span class="letter">${letter}</span>
      <span>${opt}</span>
    </button>`;
  }).join('');

  body.innerHTML = `
    <div class="question-card">
      <div class="q-topic">${q.topic}</div>
      <div class="q-text">${q.text}</div>
      ${codeBlock}
      <div class="options-list">${optionsHtml}</div>
    </div>`;

  const pct = ((current + 1) / questions.length * 100).toFixed(0);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('q-counter').textContent = `${current + 1} / ${questions.length}`;

  document.getElementById('btn-prev').disabled = current === 0;
  const isLast = current === questions.length - 1;
  const btn = document.getElementById('btn-next');
  btn.textContent = isLast ? 'Finish ✓' : 'Next →';
  btn.onclick = isLast ? finishExam : () => navigate(1);

  updateDots();
}

function selectAnswer(idx) {
  answers[current] = idx;
  renderQuestion();
}

function navigate(dir) {
  current = Math.max(0, Math.min(questions.length - 1, current + dir));
  renderQuestion();
}

function jumpTo(idx) {
  current = idx;
  renderQuestion();
}

function finishExam() {
  clearInterval(timerInterval);
  const elapsed = Math.round((Date.now() - examStartTime) / 1000);
  showResult(elapsed);
}

// ═══════════════════════════════════════════════════════
//  RESULTS
// ═══════════════════════════════════════════════════════
function showResult(elapsedSeconds) {
  document.getElementById('screen-exam').style.display   = 'none';
  document.getElementById('screen-result').style.display = 'block';
  window.scrollTo(0,0);

  let correct = 0, wrong = 0, skipped = 0;
  const topicMap = {};

  questions.forEach((q, i) => {
    if (!topicMap[q.topic]) topicMap[q.topic] = { correct: 0, total: 0 };
    topicMap[q.topic].total++;

    if (answers[i] === null) { skipped++; }
    else if (answers[i] === q.answer) { correct++; topicMap[q.topic].correct++; }
    else { wrong++; }
  });

  const pct = Math.round(correct / questions.length * 100);
  const passed = pct >= 68;

  const circumference = 2 * Math.PI * 58;
  const offset = circumference * (1 - pct / 100);
  setTimeout(() => {
    const ring = document.getElementById('ring-fill');
    ring.style.strokeDashoffset = offset;
    ring.style.stroke = passed ? '#10b981' : '#ef4444';
  }, 100);

  document.getElementById('result-pct').textContent = pct + '%';
  document.getElementById('result-verdict').textContent = passed ? '✓ PASSED!' : '✗ Failed';
  document.getElementById('result-verdict').className = 'result-verdict ' + (passed ? 'pass' : 'fail');

  const mins = Math.floor(elapsedSeconds / 60);
  const secs = elapsedSeconds % 60;
  document.getElementById('result-sub').textContent =
    `Passing score: 68% · Time: ${mins}m ${secs}s`;

  document.getElementById('rs-correct').textContent = correct;
  document.getElementById('rs-wrong').textContent   = wrong;
  document.getElementById('rs-skipped').textContent = skipped;

  const tbEl = document.getElementById('topic-breakdown');
  tbEl.innerHTML = Object.entries(topicMap)
    .sort((a,b) => b[1].total - a[1].total)
    .map(([topic, data]) => {
      const tPct = data.total > 0 ? Math.round(data.correct/data.total*100) : 0;
      const color = tPct >= 68 ? '#10b981' : tPct >= 50 ? '#f59e0b' : '#ef4444';
      return `<div class="topic-row">
        <div>
          <div class="topic-name">${topic}</div>
          <div class="topic-bar-bg"><div class="topic-bar-fill" style="width:${tPct}%;background:${color}"></div></div>
        </div>
        <div class="topic-score" style="color:${color}">${data.correct}/${data.total}</div>
      </div>`;
    }).join('');

  const reviewEl = document.getElementById('review-list');
  reviewEl.innerHTML = questions.map((q, i) => {
    const userAns = answers[i];
    let status, statusClass;
    if (userAns === null) { status = 'Skipped'; statusClass = 'skipped'; }
    else if (userAns === q.answer) { status = 'Correct'; statusClass = 'correct'; }
    else { status = 'Wrong'; statusClass = 'wrong'; }

    const correctLetter = String.fromCharCode(65 + q.answer);
    const userLetter    = userAns !== null ? String.fromCharCode(65 + userAns) : '—';
    const codeBlock     = q.code ? `<pre style="margin:0.5rem 0;font-size:0.78rem"><code>${q.code}</code></pre>` : '';

    let answerInfo = '';
    if (statusClass === 'wrong') {
      answerInfo = `<div class="answer-info">
        <span class="yours">Your answer: ${userLetter} — ${q.options[userAns]}</span><br>
        <span class="correct-ans">Correct: ${correctLetter} — ${q.options[q.answer]}</span>
      </div>`;
    } else if (statusClass === 'correct') {
      answerInfo = `<div class="answer-info"><span class="correct-ans">✓ ${correctLetter} — ${q.options[q.answer]}</span></div>`;
    } else {
      answerInfo = `<div class="answer-info" style="color:var(--muted)">Skipped · Correct: ${correctLetter} — ${q.options[q.answer]}</div>`;
    }

    return `<div class="review-item ${statusClass}">
      <div class="review-header">
        <span class="review-q-num">Question ${i+1} · ${q.topic}</span>
        <span class="tag ${statusClass}">${status}</span>
      </div>
      <div class="review-q-text">${q.text}</div>
      ${codeBlock}
      ${answerInfo}
      <div class="explanation">${q.explanation}</div>
    </div>`;
  }).join('');
}

function restart() {
  document.getElementById('screen-result').style.display = 'none';
  document.getElementById('screen-home').style.display   = 'flex';
}
